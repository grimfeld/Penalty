<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Penalty Shootout</title>
    <style>
      :root {
        /* Configurable game-stage size (logical pixels). */
        --stage-w: 800px;
        --stage-h: 360px;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #1a1a1a;
        font-family: system-ui, -apple-system, sans-serif;
        overflow: hidden;
        overscroll-behavior: none;
      }

      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 12px;
      }

      #modes {
        display: flex;
        gap: 8px;
      }

      .mode-btn {
        background: #2a2a2a;
        color: rgba(255, 255, 255, 0.85);
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 6px;
        padding: 8px 16px;
        font: 600 12px/1 monospace;
        cursor: pointer;
        letter-spacing: 0.05em;
        transition: background 0.12s ease, color 0.12s ease, border-color 0.12s ease;
      }
      .mode-btn:hover {
        background: #333;
      }
      .mode-btn.active {
        background: #4caf50;
        color: #fff;
        border-color: #4caf50;
      }

      #stage {
        position: relative;
        width: var(--stage-w);
        height: var(--stage-h);
        max-width: 100vw;
        max-height: calc(100vh - 80px);
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.6);
        border-radius: 6px;
        overflow: hidden;
        touch-action: none;
        user-select: none;
        -webkit-user-select: none;
        background: #000;
      }

      #stage canvas {
        display: block;
        width: 100%;
        height: 100%;
      }

      #hud {
        position: absolute;
        left: 6px;
        bottom: 6px;
        display: flex;
        align-items: center;
        gap: 4px;
        font-size: 9px;
        color: rgba(255, 255, 255, 0.7);
        font-family: monospace;
        text-shadow: 0 1px 1px rgba(0, 0, 0, 0.6);
        z-index: 10;
        pointer-events: auto;
      }

      #outcome {
        width: 60px;
        height: 12px;
        margin: 0;
      }
    </style>
  </head>
  <body>
    <div id="modes">
      <button class="mode-btn active" data-mode="kaplay">2D · Kaplay</button>
      <button class="mode-btn" data-mode="three">3D · Three.js</button>
    </div>
    <div id="stage">
      <div id="hud">
        <span>L</span>
        <input id="outcome" type="range" min="0" max="1" value="1" step="1" />
        <span>W</span>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
