<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Penalty Shootout</title>
    <style>
      :root {
        /* Configurable game-stage size (logical pixels). */
        --stage-w: 800px;
        --stage-h: 360px;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #1a1a1a;
        font-family: system-ui, -apple-system, sans-serif;
        overflow: hidden;
        overscroll-behavior: none;
      }

      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 12px;
      }

      #modes {
        display: flex;
        gap: 8px;
      }

      .mode-btn {
        background: #2a2a2a;
        color: rgba(255, 255, 255, 0.85);
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 6px;
        padding: 8px 16px;
        font: 600 12px/1 monospace;
        cursor: pointer;
        letter-spacing: 0.05em;
        transition: background 0.12s ease, color 0.12s ease, border-color 0.12s ease;
      }
      .mode-btn:hover {
        background: #333;
      }
      .mode-btn.active {
        background: #4caf50;
        color: #fff;
        border-color: #4caf50;
      }

      #stage {
        position: relative;
        width: var(--stage-w);
        height: var(--stage-h);
        max-width: 100vw;
        max-height: calc(100vh - 80px);
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.6);
        border-radius: 6px;
        overflow: hidden;
        touch-action: none;
        user-select: none;
        -webkit-user-select: none;
        background: #000;
      }

      #stage canvas {
        display: block;
        width: 100%;
        height: 100%;
      }

      #hud {
        position: absolute;
        left: 6px;
        right: 6px;
        bottom: 6px;
        display: flex;
        flex-wrap: wrap;
        align-items: flex-end;
        justify-content: space-between;
        gap: 8px;
        font-size: 11px;
        color: rgba(255, 255, 255, 0.88);
        font-family: system-ui, sans-serif;
        text-shadow: 0 1px 2px rgba(0, 0, 0, 0.75);
        z-index: 10;
        pointer-events: none;
      }

      #hud > * {
        pointer-events: auto;
      }

      #legacy-outcome-hud {
        display: flex;
        align-items: center;
        gap: 4px;
        font-size: 9px;
        font-family: monospace;
        color: rgba(255, 255, 255, 0.7);
      }

      #three-session-hud {
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 2px;
        text-align: right;
        line-height: 1.25;
        max-width: 55%;
      }

      #three-session-hud .three-hud-title {
        font-size: 9px;
        font-weight: 600;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.55);
      }

      #three-session-hud .three-hud-row {
        font-size: 13px;
        font-weight: 700;
      }

      #three-session-hud .three-hud-sub {
        font-size: 10px;
        color: rgba(255, 255, 255, 0.65);
      }

      #three-session-restart {
        margin-top: 6px;
        padding: 6px 12px;
        font: 600 11px/1 system-ui, sans-serif;
        letter-spacing: 0.04em;
        color: #fff;
        background: #2e7d32;
        border: 1px solid rgba(255, 255, 255, 0.25);
        border-radius: 6px;
        cursor: pointer;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.35);
      }

      #three-session-restart:hover {
        background: #388e3c;
      }

      #three-session-restart:focus-visible {
        outline: 2px solid #a5d6a7;
        outline-offset: 2px;
      }

      #outcome {
        width: 60px;
        height: 12px;
        margin: 0;
      }

      #runtime-image-controls {
        width: min(var(--stage-w), 100vw);
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .runtime-url-control {
        display: flex;
        align-items: center;
        gap: 8px;
        color: rgba(255, 255, 255, 0.78);
        font-size: 12px;
      }

      .runtime-url-control label {
        white-space: nowrap;
        font-weight: 600;
        min-width: 145px;
      }

      .runtime-url-control input {
        flex: 1;
        min-width: 0;
        padding: 7px 9px;
        color: #fff;
        background: #222;
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 6px;
        font: 12px/1.2 system-ui, sans-serif;
      }

      .runtime-url-control input:focus {
        outline: 2px solid rgba(76, 175, 80, 0.55);
        outline-offset: 1px;
        border-color: #4caf50;
      }
    </style>
  </head>
  <body>
    <div id="modes">
      <button class="mode-btn active" data-mode="kaplay">2D · Kaplay</button>
      <button class="mode-btn" data-mode="three">3D · Three.js</button>
    </div>
    <div id="stage">
      <div id="hud">
        <div id="legacy-outcome-hud" hidden>
          <span>L</span>
          <input id="outcome" type="range" min="0" max="1" value="1" step="1" />
          <span>W</span>
        </div>
        <div id="three-session-hud" hidden>
          <div class="three-hud-title">Penalty session</div>
          <div id="three-hud-shot" class="three-hud-row">Shot 1 / 3</div>
          <div id="three-hud-score" class="three-hud-row">Goals: 0</div>
          <div id="three-hud-status" class="three-hud-sub"></div>
          <button type="button" id="three-session-restart" hidden>
            Play again
          </button>
        </div>
      </div>
    </div>
    <div id="runtime-image-controls">
      <div class="runtime-url-control">
        <label for="ad-board-url">Ad board logo URL</label>
        <input
          id="ad-board-url"
          type="url"
          placeholder="https://example.com/logo.png"
          spellcheck="false"
        />
      </div>
      <div class="runtime-url-control">
        <label for="stadium-background-url">Stadium background URL</label>
        <input
          id="stadium-background-url"
          type="url"
          placeholder="https://example.com/stadium.jpg"
          spellcheck="false"
        />
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
